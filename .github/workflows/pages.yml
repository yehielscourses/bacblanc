name: Deploy GitHub Pages (QCM quiz)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'annales-nsi-premiere/qcm-json/toutes-questions-uniques-avec-corrections.json'
      - '.github/workflows/pages.yml'
      - 'scripts/prepare_quiz_app.sh'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync QCM data into docs
        run: bash scripts/prepare_quiz_app.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
